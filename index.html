<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>刀剣乱舞 経験値計算機</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>刀剣乱舞 特累積経験値計算機</h1>

  <div class="calculator">
    <div class="form-group select-group">
      <label for="typeSelect">刀種を選択:</label>
      <select id="typeSelect">
        <option value="tantou">短刀</option>
        <option value="waki_yari_nagi">脇差・槍・薙刀</option>
        <option value="uchigatana_rare2">打刀（レア2）</option>
        <option value="uchigatana_rare3">打刀（レア3）</option>
        <option value="tachi">太刀</option>
        <option value="ootachi_turugi">大太刀・剣</option>
      </select>
    </div>

<div class="form-group select-group">
<label class="mode">
<input type="radio" name="mode" value="exp" checked>
累積経験値から極Lvを計算
</label>
</div>
<div class="form-group">
<label class="mode">
<input type="radio" name="mode" value="level">
目標極Lvまでの累積経験値
</label>
</div>

<input type="number" id="mainInput">

<button onclick="calc()">計算</button>

    <p id="result">ここに結果が表示されます</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
